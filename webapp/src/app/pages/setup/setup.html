<div class="h-full flex justify-center items-center">
  <p-card class="max-w-[400px]">
    <ng-template #header>
      <div class="flex justify-center px-5 pt-6">
        <p-avatar image="favicon.svg" size="xlarge" />
      </div>
    </ng-template>

    <ng-template #title>
      <p class="text-2xl font-bold text-center text-balance">Relay Manager</p>
    </ng-template>

    <ng-template #subtitle>
      <p class="text-center text-balance">Manage your Firefox Relay aliases</p>
    </ng-template>

    <form (ngSubmit)="connect()" class="flex flex-col gap-4 mt-6 mb-2">
      <p-password
        name="apiKey"
        placeholder="API Key"
        [ngModel]="apiKey()"
        (ngModelChange)="apiKey.set($event)"
        (input)="error.set('')"
        toggleMask
        autocomplete="off"
        feedback="false"
        class="{{ apiKey() ? 'font-mono' : '' }}"
        fluid
      />

      <p-button
        label="Connect"
        fluid
        icon="ph ph-link-simple"
        [loading]="isLoading()"
        [disabled]="!apiKey().trim()"
        (click)="connect()"
      />

      @if (error()) {
        <p-message severity="error" class="justify-center">
          <p class="text-center text-balance">
            {{ error() }}
          </p>
        </p-message>
      }
    </form>

    <ng-template #footer>
      <div class="flex flex-col gap-4">
        <p class="text-center text-balance text-sm text-current/50">
          Your API Key is stored locally in your browser and never sent anywhere except Firefox
          Relay's API.
        </p>

        <a
          pButton
          href="https://relay.firefox.com/accounts/settings/"
          target="_blank"
          rel="noopener noreferrer"
          size="small"
          class="self-center"
          severity="secondary"
        >
          <span pButtonLabel>Get your API Key</span>
        </a>
      </div>
    </ng-template>
  </p-card>
</div>
