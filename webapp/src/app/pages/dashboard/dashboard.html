<div class="flex flex-col gap-4">
  <p-panel>
    <ng-template #header>
      <div class="flex flex-col gap-1 w-full">
        <span>Welcome,</span>

        @if (data()) {
          <span class="text-xl font-semibold break-all line-clamp-2">
            {{ data().email }}
          </span>
        } @else {
          <p-skeleton height="28px" [style]="{ maxWidth: '320px' }" />
        }
      </div>
    </ng-template>

    @if (data()) {
      <p-tag severity="success" value="{{ data().profile.has_premium ? 'Premium' : 'Free' }}">
        <i
          class="mr-0.5 ph {{ data().profile.has_premium ? 'ph-shield-star' : 'ph ph-shield' }}"
        ></i>
      </p-tag>
    } @else {
      <p-skeleton height="29px" width="80px" />
    }

    @if (data() && data().profile.subdomain) {
      <div class="mt-4.5 flex flex-col gap-1 w-full">
        <span>Your custom subdomain is</span>

        <span class="font-semibold break-all line-clamp-2">
          @{{ data().profile.subdomain }}.mozmail.com
        </span>
      </div>
    }

    <ng-template #footer>
      <p-button
        label="Disconnect"
        size="small"
        icon="ph ph-link-simple-break"
        (click)="disconnect()"
      />
    </ng-template>
  </p-panel>
</div>
